ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ br.com.trabalhoarretado.ApplicationKt.module ]
    }
}

database {
    url = ${DATABASE_URL}
    user = ${DATABASE_USER}
    password = ${DATABASE_PASSWORD}
}

jwt {
    secret = ${JWT_SECRET}
    issuer = "trabalho-arretado"
    audience = "trabalho-arretado-users"
    realm = "Trabalho Arretado"
    expiresInDays = 7
}
